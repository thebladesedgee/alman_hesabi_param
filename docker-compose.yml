services:
  db:
    image: postgres:16-alpine
    container_name: alman_hesabi_db
    environment:
      POSTGRES_DB: alman_hesabi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: alman_hesabi_backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/alman_hesabi?sslmode=disable"
      JWT_SECRET: "change-this-in-production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
